  <style>
    /* Dropdown container */
    .dropdown {
      position: relative;
      display: inline-block;
    }

    /* Button */
    .dropbtn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: inherit;
    }

    /* Dropdown menu */
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: white;
      min-width: 80px;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
      list-style: none;
      padding: 0;
      margin: 0;
      z-index: 1000;
    }

    /* Links inside dropdown */
    .dropdown-content li a {
      display: block;
      padding: 10px;
      text-decoration: none;
      color: black;
    }

    .dropdown-content li a:hover {
      background-color: #f1f1f1;
    }

    /* Show dropdown on hover */
    .dropdown:hover .dropdown-content {
      display: block;
    }
  </style>

</head>
